<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#12141f">
<title>Sleep Tracker</title>
<!--
  This version stores data in the browser's localStorage instead of the
  Claude account-based storage. Your entries never leave this device or
  touch any server.

  IMPORTANT: localStorage is unreliable when a file is opened directly
  (double-clicked) with no server. For it to work reliably, host this
  file at a real https address, for example with GitHub Pages, then open
  that address on your phone and add it to your home screen.
-->
<style>
  :root {
    --bg: #12141f;
    --surface: #1c2032;
    --surface-alt: #242940;
    --border: #2f3450;
    --text: #ece9e2;
    --text-dim: #9a9fb5;
    --accent: #e8b75d;
    --accent-dim: rgba(232,183,93,0.14);
    --danger: #b6584c;
    --danger-dim: rgba(182,88,76,0.14);
    --good: #6fa88f;
    --radius: 14px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    min-height: 100%;
  }
  #sleep-tracker-root {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding: calc(20px + env(safe-area-inset-top)) calc(16px + env(safe-area-inset-right)) calc(60px + env(safe-area-inset-bottom)) calc(16px + env(safe-area-inset-left));
    max-width: 560px;
    margin: 0 auto;
    min-height: 100vh;
    min-height: 100dvh;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 22px;
  }
  .moon {
    flex-shrink: 0;
  }
  .header h1 {
    font-family: ui-serif, Georgia, "Times New Roman", serif;
    font-weight: 500;
    font-size: 22px;
    letter-spacing: 0.2px;
    margin: 0;
  }
  .header p {
    margin: 2px 0 0;
    font-size: 13px;
    color: var(--text-dim);
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 16px;
  }
  .card h2 {
    font-family: ui-serif, Georgia, serif;
    font-weight: 500;
    font-size: 15px;
    margin: 0 0 14px;
    color: var(--text);
  }
  label {
    display: block;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .field { margin-bottom: 16px; }
  .row2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .row2 .field {
    min-width: 0;
  }
  input[type="date"], input[type="time"], textarea {
    width: 100%;
    min-width: 0;
    background: var(--surface-alt);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    padding: 11px 8px;
    font-size: 15px;
    font-family: inherit;
  }
  textarea {
    min-height: 70px;
    resize: vertical;
  }
  .stepper {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface-alt);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 12px;
    width: fit-content;
  }
  .stepper button {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--accent);
    font-size: 19px;
    line-height: 1;
    cursor: pointer;
  }
  .stepper button:active { background: var(--accent-dim); }
  .stepper .count {
    font-size: 20px;
    min-width: 24px;
    text-align: center;
    font-variant-numeric: tabular-nums;
  }
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .chip {
    padding: 9px 13px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--surface-alt);
    color: var(--text-dim);
    font-size: 13px;
    cursor: pointer;
    user-select: none;
  }
  .chip.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }
  .btn {
    display: block;
    width: 100%;
    padding: 13px;
    border-radius: 10px;
    border: none;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-primary { background: var(--accent); color: #12141f; }
  .btn-secondary {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    margin-top: 8px;
  }
  .status {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 10px;
    min-height: 14px;
  }
  .entry {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 10px;
  }
  .entry-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 6px;
  }
  .entry-date { font-weight: 600; font-size: 14px; }
  .entry-wake { font-size: 13px; color: var(--accent); }
  .entry-factors {
    font-size: 12.5px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  .entry-notes { font-size: 13px; color: var(--text); margin-bottom: 8px; }
  .entry-actions { display: flex; gap: 10px; }
  .link-btn {
    background: none;
    border: none;
    font-size: 12.5px;
    cursor: pointer;
    padding: 0;
  }
  .link-btn.edit { color: var(--good); }
  .link-btn.delete { color: var(--danger); }
  .empty {
    color: var(--text-dim);
    font-size: 13.5px;
    text-align: center;
    padding: 10px 0;
  }
  .summary-row {
    display: flex;
    justify-content: space-between;
    font-size: 13.5px;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
  }
  .summary-row:last-child { border-bottom: none; }
  .bar-track {
    background: var(--surface-alt);
    border-radius: 5px;
    height: 7px;
    margin-top: 4px;
    overflow: hidden;
  }
  .bar-fill { height: 100%; background: var(--accent); }
  .factor-item { margin-bottom: 10px; }
  .factor-label {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 3px;
  }
  .stat-nums {
    display: flex;
    gap: 18px;
    margin-bottom: 14px;
  }
  .stat-num .big { font-size: 24px; font-weight: 600; color: var(--accent); font-family: ui-serif, Georgia, serif; }
  .stat-num .small { font-size: 11.5px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.4px; }
  .footer-row {
    display: flex;
    gap: 10px;
  }
  .footer-row .btn-secondary { flex: 1; margin-top: 0; }
</style>
</head>
<body>

<div id="sleep-tracker-root">
  <div class="header">
    <svg class="moon" width="34" height="34" viewBox="0 0 34 34">
      <circle cx="17" cy="17" r="15" fill="none" stroke="#2f3450" stroke-width="2"/>
      <path d="M20 4 A14 14 0 1 0 20 30 A11 11 0 1 1 20 4 Z" fill="#e8b75d"/>
    </svg>
    <div>
      <h1>Sleep Tracker</h1>
      <p>Log wake-ups and what might be behind them</p>
    </div>
  </div>

  <div class="card">
    <h2>Tonight's entry</h2>
    <div class="row2">
      <div class="field">
        <label for="st-date">Date</label>
        <input type="date" id="st-date">
      </div>
      <div class="field">
        <label for="st-bedtime">Bedtime</label>
        <input type="time" id="st-bedtime">
      </div>
    </div>

    <div class="field">
      <label>Times woken up</label>
      <div class="stepper">
        <button type="button" id="st-minus">–</button>
        <span class="count" id="st-count">0</span>
        <button type="button" id="st-plus">+</button>
      </div>
    </div>

    <div class="field">
      <label>Bathroom trips</label>
      <div class="stepper">
        <button type="button" id="st-bathroom-minus">–</button>
        <span class="count" id="st-bathroom-count">0</span>
        <button type="button" id="st-bathroom-plus">+</button>
      </div>
    </div>

    <div class="field">
      <label>Possible factors</label>
      <div class="chips" id="st-chips"></div>
    </div>

    <div class="field">
      <label for="st-notes">Notes</label>
      <textarea id="st-notes" placeholder="Anything else worth remembering about last night"></textarea>
    </div>

    <button class="btn btn-primary" id="st-save">Save entry</button>
    <button class="btn btn-secondary" id="st-clear-form" style="display:none;">Cancel edit</button>
    <div class="status" id="st-status"></div>
  </div>

  <div class="card" id="st-summary-card">
    <h2>Summary</h2>
    <div id="st-summary-body"></div>
  </div>

  <div class="card">
    <h2>History</h2>
    <div id="st-history"></div>
  </div>

  <div class="footer-row">
    <button class="btn btn-secondary" id="st-export">Export CSV</button>
    <button class="btn btn-secondary" id="st-reset">Clear all data</button>
  </div>
</div>

<script>
(function () {
  const FACTORS = [
    "Caffeine after noon",
    "Ate close to bedtime",
    "Screen time before bed",
    "Stress or anxious thoughts",
    "Room too warm or cold",
    "Noise",
    "Pain or discomfort",
    "Medication side effect"
  ];

  const STORAGE_KEY = "sleep-entries";
  let entries = {};
  let selectedFactors = new Set();
  let editingDate = null;

  const $ = (id) => document.getElementById(id);
  const dateInput = $("st-date");
  const bedtimeInput = $("st-bedtime");
  const countEl = $("st-count");
  const bathroomCountEl = $("st-bathroom-count");
  const chipsEl = $("st-chips");
  const notesInput = $("st-notes");
  const statusEl = $("st-status");
  const historyEl = $("st-history");
  const summaryEl = $("st-summary-body");
  const cancelBtn = $("st-clear-form");

  let wakeCount = 0;
  let bathroomCount = 0;

  function todayStr() {
    const d = new Date();
    const off = d.getTimezoneOffset();
    const local = new Date(d.getTime() - off * 60000);
    return local.toISOString().slice(0, 10);
  }

  function setStatus(msg, isError) {
    statusEl.textContent = msg;
    statusEl.style.color = isError ? "#b6584c" : "#9a9fb5";
    if (msg) setTimeout(() => { if (statusEl.textContent === msg) statusEl.textContent = ""; }, 3000);
  }

  function renderChips() {
    chipsEl.innerHTML = "";
    FACTORS.forEach((f) => {
      const chip = document.createElement("div");
      chip.className = "chip" + (selectedFactors.has(f) ? " active" : "");
      chip.textContent = f;
      chip.onclick = () => {
        if (selectedFactors.has(f)) selectedFactors.delete(f);
        else selectedFactors.add(f);
        renderChips();
      };
      chipsEl.appendChild(chip);
    });
  }

  function resetForm() {
    dateInput.value = todayStr();
    bedtimeInput.value = "";
    wakeCount = 0;
    countEl.textContent = "0";
    bathroomCount = 0;
    bathroomCountEl.textContent = "0";
    selectedFactors = new Set();
    notesInput.value = "";
    editingDate = null;
    cancelBtn.style.display = "none";
    renderChips();
  }

  async function loadEntries() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      entries = raw ? JSON.parse(raw) : {};
    } catch (e) {
      entries = {};
      setStatus("Could not read saved data on this device.", true);
    }
    renderHistory();
    renderSummary();
  }

  async function saveEntries() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
      return true;
    } catch (e) {
      setStatus("Could not save. Your browser may be blocking local storage.", true);
      return false;
    }
  }

  function fmtDate(str) {
    const [y, m, d] = str.split("-").map(Number);
    const dt = new Date(y, m - 1, d);
    return dt.toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" });
  }

  function renderHistory() {
    const dates = Object.keys(entries).sort().reverse();
    if (dates.length === 0) {
      historyEl.innerHTML = '<div class="empty">No entries yet. Save tonight\'s entry to get started.</div>';
      return;
    }
    historyEl.innerHTML = "";
    dates.forEach((d) => {
      const e = entries[d];
      const div = document.createElement("div");
      div.className = "entry";
      const factorsLine = e.factors && e.factors.length ? e.factors.join(", ") : "No factors logged";
      div.innerHTML = `
        <div class="entry-top">
          <span class="entry-date">${fmtDate(d)}</span>
          <span class="entry-wake">${e.wakeCount} wake-up${e.wakeCount === 1 ? "" : "s"}${e.bathroomCount ? `, ${e.bathroomCount} bathroom trip${e.bathroomCount === 1 ? "" : "s"}` : ""}</span>
        </div>
        <div class="entry-factors">${factorsLine}</div>
        ${e.notes ? `<div class="entry-notes">${escapeHtml(e.notes)}</div>` : ""}
        <div class="entry-actions">
          <button class="link-btn edit" data-date="${d}">Edit</button>
          <button class="link-btn delete" data-date="${d}">Delete</button>
        </div>
      `;
      historyEl.appendChild(div);
    });

    historyEl.querySelectorAll(".edit").forEach((btn) => {
      btn.onclick = () => loadEntryIntoForm(btn.dataset.date);
    });
    historyEl.querySelectorAll(".delete").forEach((btn) => {
      btn.onclick = () => deleteEntry(btn.dataset.date);
    });
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  function loadEntryIntoForm(dateStr) {
    const e = entries[dateStr];
    if (!e) return;
    dateInput.value = dateStr;
    bedtimeInput.value = e.bedtime || "";
    wakeCount = e.wakeCount || 0;
    countEl.textContent = String(wakeCount);
    bathroomCount = e.bathroomCount || 0;
    bathroomCountEl.textContent = String(bathroomCount);
    selectedFactors = new Set(e.factors || []);
    notesInput.value = e.notes || "";
    editingDate = dateStr;
    cancelBtn.style.display = "block";
    renderChips();
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  async function deleteEntry(dateStr) {
    delete entries[dateStr];
    const ok = await saveEntries();
    if (ok) {
      setStatus("Entry deleted.");
      renderHistory();
      renderSummary();
    }
  }

  function renderSummary() {
    const dates = Object.keys(entries).sort().reverse();
    if (dates.length === 0) {
      summaryEl.innerHTML = '<div class="empty">Your averages and top factors will show up here once you have a few entries.</div>';
      return;
    }
    const last7 = dates.slice(0, 7).map((d) => entries[d]);
    const last30 = dates.slice(0, 30).map((d) => entries[d]);
    const avg = (arr) => arr.length ? (arr.reduce((s, e) => s + (e.wakeCount || 0), 0) / arr.length).toFixed(1) : "0";

    const factorCounts = {};
    last30.forEach((e) => {
      (e.factors || []).forEach((f) => {
        factorCounts[f] = (factorCounts[f] || 0) + 1;
      });
    });
    const topFactors = Object.entries(factorCounts).sort((a, b) => b[1] - a[1]).slice(0, 5);
    const maxCount = topFactors.length ? topFactors[0][1] : 1;

    let html = `
      <div class="stat-nums">
        <div class="stat-num"><div class="big">${avg(last7)}</div><div class="small">Avg last 7 nights</div></div>
        <div class="stat-num"><div class="big">${avg(last30)}</div><div class="small">Avg last 30 nights</div></div>
      </div>
    `;
    if (topFactors.length) {
      html += `<div style="font-size:12px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:8px;">Most logged factors (last 30 nights)</div>`;
      topFactors.forEach(([f, c]) => {
        const pct = Math.round((c / maxCount) * 100);
        html += `
          <div class="factor-item">
            <div class="factor-label"><span>${f}</span><span>${c}</span></div>
            <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
          </div>
        `;
      });
    }
    summaryEl.innerHTML = html;
  }

  $("st-minus").onclick = () => {
    wakeCount = Math.max(0, wakeCount - 1);
    countEl.textContent = String(wakeCount);
  };
  $("st-plus").onclick = () => {
    wakeCount += 1;
    countEl.textContent = String(wakeCount);
  };
  $("st-bathroom-minus").onclick = () => {
    bathroomCount = Math.max(0, bathroomCount - 1);
    bathroomCountEl.textContent = String(bathroomCount);
  };
  $("st-bathroom-plus").onclick = () => {
    bathroomCount += 1;
    bathroomCountEl.textContent = String(bathroomCount);
  };

  $("st-save").onclick = async () => {
    const d = dateInput.value || todayStr();
    const entry = {
      date: d,
      bedtime: bedtimeInput.value || "",
      wakeCount: wakeCount,
      bathroomCount: bathroomCount,
      factors: Array.from(selectedFactors),
      notes: notesInput.value.trim(),
      savedAt: new Date().toISOString()
    };
    if (editingDate && editingDate !== d) {
      delete entries[editingDate];
    }
    entries[d] = entry;
    const ok = await saveEntries();
    if (ok) {
      setStatus("Entry saved.");
      renderHistory();
      renderSummary();
      resetForm();
    }
  };

  cancelBtn.onclick = resetForm;

  $("st-export").onclick = () => {
    const dates = Object.keys(entries).sort();
    if (dates.length === 0) {
      setStatus("Nothing to export yet.", true);
      return;
    }
    const header = ["Date", "Bedtime", "Wake Count", "Bathroom Trips", "Factors", "Notes"];
    const rows = dates.map((d) => {
      const e = entries[d];
      const factors = (e.factors || []).join("; ");
      const notes = (e.notes || "").replace(/"/g, '""');
      return [e.date, e.bedtime || "", e.wakeCount, e.bathroomCount || 0, `"${factors}"`, `"${notes}"`].join(",");
    });
    const csv = [header.join(","), ...rows].join("\n");
    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "sleep-tracker-export.csv";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  $("st-reset").onclick = async () => {
    if (!confirm("This deletes every saved entry. Continue?")) return;
    entries = {};
    const ok = await saveEntries();
    if (ok) {
      setStatus("All entries cleared.");
      renderHistory();
      renderSummary();
      resetForm();
    }
  };

  resetForm();
  loadEntries();
})();
</script>
</body>
</html>
